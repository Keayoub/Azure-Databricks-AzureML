# Conda environment for Azure ML - Databricks MLflow integration
name: azureml-mlflow-integration
dependencies:
  - python=3.10
  - pip
  - pip:
    - azure-identity>=1.14.0
    - azure-ai-ml>=1.10.0
    - databricks-sdk>=0.20.0
    - mlflow>=2.7.0
    - numpy>=1.24.0
    - pandas>=1.5.0
    - scikit-learn>=1.3.0
    - requests>=2.31.0
    - pyyaml>=6.0
